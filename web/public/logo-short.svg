<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <!-- Gradient representing the flow from Expense to Balance -->
    <linearGradient id="trendGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" /> <!-- Red -->
      <stop offset="50%" stop-color="#8b5cf6" /> <!-- Purple transiton -->
      <stop offset="100%" stop-color="#10b981" /> <!-- Green -->
    </linearGradient>
  </defs>

  <!-- Deep App Background -->
  <rect width="100" height="100" rx="22" fill="#0f172a" />
  
  <!-- The Infrastructure Boundary (Your isolated environment) -->
  <polygon points="50,18 78,34 78,66 50,82 22,66 22,34" fill="none" stroke="#1e293b" stroke-width="6" stroke-linejoin="round" />
  
  <!-- The Financial Track breaking out of the boundary -->
  <path d="M 18 52 L 40 68 L 58 45 L 86 28" fill="none" stroke="url(#trendGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Data Nodes -->
  <circle cx="18" cy="52" r="4.5" fill="#ef4444" />
  <circle cx="40" cy="68" r="4.5" fill="#f8fafc" />
  <circle cx="58" cy="45" r="4.5" fill="#f8fafc" />
  <circle cx="86" cy="28" r="4.5" fill="#10b981" />
</svg>
